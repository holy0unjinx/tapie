<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="성스러운 교회 배경 일러스트">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f1e3"/>
      <stop offset="55%" stop-color="#efe1c4"/>
      <stop offset="100%" stop-color="#e7dac0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="28%" r="42%">
